---
name: Build & Release
on:
    release:
        types: [created]
jobs:
    build:
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set version
              id: vars
              run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            - name: Build arm64
              run: |
                swiftc -O -target arm64-apple-macos11.0 src/*.swift -o rgn-arm64
            - name: Build x86_64
              run: |
                swiftc -O -target x86_64-apple-macos11.0 src/*.swift -o rgn-x86_64
            - name: Create universal binary
              run: |
                lipo -create -output rgn rgn-arm64 rgn-x86_64
            - name: Rename binary
              run: |
                mv rgn rgn-${{ steps.vars.outputs.VERSION }}
            - name: Zip artifact
              run: |
                zip rgn-${{ steps.vars.outputs.VERSION }}-macos.zip rgn-${{ steps.vars.outputs.VERSION }}
            - name: Upload release asset
              uses: softprops/action-gh-release@v2
              with:
                files: rgn-*-macos.zip
