---
name: Build & Release
on:
    release:
        types: [created]
permissions:
    contents: write
jobs:
    build:
        runs-on: macos-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            - name: Set version
              id: vars
              run: echo "VERSION=$(git describe --tags --always)" >> $GITHUB_OUTPUT
            - name: Generate version file
              run: |
                echo "let appVersion = \"${{ steps.vars.outputs.VERSION }}\"" > Sources/rgn/build.swift
            - name: Build arm64
              run: swift build -c release --arch arm64
            - name: Package arm64
              run: |
                mkdir -p dist/arm64
                cp .build/release/rgn dist/arm64/
                tar -czf rgn-${{ steps.vars.outputs.VERSION }}-darwin_arm64.tar.gz -C dist/arm64 rgn
            - name: Build x86_64
              run: |
                swift build -c release --arch x86_64
            - name: Package x86_64
              run: |
                mkdir -p dist/amd64
                cp .build/release/rgn dist/amd64/
                tar -czf rgn-${{ steps.vars.outputs.VERSION }}-darwin_amd64.tar.gz -C dist/amd64 rgn
            - name: Upload release assets
              uses: softprops/action-gh-release@v2
              with:
                files: |
                    rgn-*-darwin_*.tar.gz
